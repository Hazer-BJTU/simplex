  # Bash Python Runner

  This skill provides comprehensive guidance on executing Python scripts via bash commands and managing Python environments effectively for AI code agents. It covers best practices for ensuring consistent execution environments and avoiding common pitfalls.

  This skill focuses on advanced methods for executing Python scripts via bash commands and managing Python environments (including venv, conda, and uv) for AI code agents, particularly in non-interactive contexts.
  ## Core Commands

  ### 1. Running Python Scripts

  To execute a Python script from the command line:

  ```bash
  python script_name.py
  ```

  For Python 3 specifically (recommended):
  ```bash
  python3 script_name.py
  ```

  To pass arguments to the script:
  ```bash
  python3 script_name.py arg1 arg2 arg3
  ```

  ### 2. Managing Python Environments

  #### Creating a Virtual Environment
  ```bash
  python3 -m venv myenv
  ```

  Where `myenv` is the name of your virtual environment directory.

  #### Activating a Virtual Environment
  ```bash
  source myenv/bin/activate  # On Linux/macOS
  # OR
  myenv\Scripts\activate     # On Windows
  ```

  After activation, your prompt should change to indicate the active environment:
  ```bash
  (myenv) $
  ```

  #### Deactivating a Virtual Environment
  ```bash
  deactivate
  ```

  #### Installing Packages in an Environment
  With the environment activated:
  ```bash
  pip install package_name
  ```

  Or install from a requirements file:
  ```bash
  pip install -r requirements.txt
  ```

