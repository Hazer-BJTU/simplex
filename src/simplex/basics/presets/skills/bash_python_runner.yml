  ## Advanced Environment Management

  ### Using Conda
  Conda is a powerful package and environment manager that works well with Python projects, especially in data science contexts.

  Creating a conda environment:
  ```bash
  conda create -n env_name python=3.x
  ```

  Activating a conda environment:
  ```bash
  conda activate env_name
  ```

  Deactivating a conda environment:
  ```bash
  conda deactivate
  ```

  Installing packages in a conda environment:
  ```bash
  conda install package_name
  # OR
  conda env update -f environment.yml
  ```

  ### Using uv for Fast Dependency Management
  `uv` is a fast Python package installer and resolver.

  Installing uv (requires Python 3.8+):
  ```bash
  pip install uv
  ```

  Creating a virtual environment with uv:
  ```bash
  uv venv .venv
  ```

  Activating the environment created by uv:
  ```bash
  source .venv/bin/activate  # On Linux/macOS
  # OR
  .venv\Scripts\activate     # On Windows
  ```

  Installing dependencies with uv (from pyproject.toml or requirements.txt):
  ```bash
  uv sync               # Installs from pyproject.toml
  # OR
  uv pip install -r requirements.txt
  ```

  ### Non-Interactive Terminal Execution

  When running commands in non-interactive environments (like CI/CD pipelines, Docker containers, or scheduled tasks), special care is needed to ensure proper execution flow.

  #### Concatenating Commands
  Use `&&` to chain commands so that subsequent commands only run if the previous ones succeed:
  ```bash
  source myenv/bin/activate && python3 my_script.py && deactivate
  ```

  Use `;` to run commands sequentially regardless of success/failure:
  ```bash
  source myenv/bin/activate ; python3 my_script.py ; deactivate
  ```

  Use `||` to run alternative commands if the first fails:
  ```bash
  python3 my_script.py || echo "Script failed"
  ```

  #### Running Scripts Without Interactive Activation
  To run Python scripts without manually activating the environment, specify the full path to the Python interpreter within the environment:
  ```bash
  /path/to/myenv/bin/python3 script.py
  # OR for conda
  /path/to/conda/envs/env_name/bin/python3 script.py
  # OR for uv
  .venv/bin/python3 script.py
  ```

  This approach is often preferred in automated scripts and deployment scenarios.

  ## Troubleshooting Common Issues

  ## Troubleshooting Common Issues

  ### Command Not Found
  If you encounter `python: command not found`, check:
  - If Python is installed on the system
  - If Python is added to your PATH variable
  - Try using `python3` instead of `python`

  ### Permission Denied
  If you get permission errors, try:
  ```bash
  chmod +x script_name.py
  ```
  Then run with `./script_name.py`.

  ### Module Not Found Error
  This usually indicates that required packages aren't installed in the active environment. Activate your environment and install the necessary packages:
  ```bash
  source myenv/bin/activate
  pip install -r requirements.txt
  ```
