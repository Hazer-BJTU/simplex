  3. **Capture Output**: Use redirection to capture output or errors:
     ```bash
     python3 script.py > output.log 2>&1
     ```

  4. **Verify Execution Success**: Check the exit status after running a command:
     ```bash
     python3 script.py
     echo $?  # This shows the exit code of the last command
     ```

  5. **Environment Activation in Scripts**: Include explicit activation in automated scripts:
     ```bash
     #!/bin/bash
     source myenv/bin/activate
     python3 my_script.py
