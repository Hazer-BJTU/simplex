content: |
  # Git Operations Assistant
  
  This skill provides comprehensive guidance on Git operations for effective version control management in development workflows. It covers essential commands, best practices, and common scenarios encountered during software development.
  
  ## Core Git Operations
  
  ### 1. Repository Setup
  - **Initialize a repository**: `git init` creates a new Git repository in the current directory
  - **Clone existing repository**: `git clone <repository_url>` copies a remote repository to your local machine
  - **Connect to remote**: `git remote add origin <remote_url>` links your local repo to a remote repository
  
  ### 2. Staging and Committing Changes
  - **Check status**: `git status` shows the current state of files in the working directory
  - **Add files to staging**: 
    - `git add <file_name>` adds specific file(s)
    - `git add .` adds all modified files
  - **Commit changes**: `git commit -m "Descriptive commit message"` saves changes with a descriptive message
  
  ## Branch Management
  
  ### Creating and Switching Branches
  - **List branches**: `git branch` shows all local branches
  - **Create new branch**: `git branch <branch_name>` creates a new branch
  - **Switch branches**: `git checkout <branch_name>` switches to specified branch
  - **Create and switch**: `git checkout -b <branch_name>` creates and switches to new branch in one command
  - **Alternative switch**: `git switch <branch_name>` modern command for switching branches
  
  ### Merging and Updating
  - **Merge branch**: `git merge <branch_name>` merges specified branch into current branch
  - **Update from remote**: `git pull origin <branch_name>` fetches and merges remote changes
  - **Push changes**: `git push origin <branch_name>` uploads local commits to remote repository
  
  ## Advanced Operations
  
  ### Undoing Changes
  - **Unstage file**: `git reset HEAD <file_name>` removes file from staging area
  - **Undo last commit**: `git reset --soft HEAD~1` undoes last commit but keeps changes
  - **Discard changes**: `git checkout -- <file_name>` discards uncommitted changes in file
  - **Revert commit**: `git revert <commit_hash>` creates a new commit that undoes changes from a previous commit
  
  ### Collaboration Best Practices
  1. Always pull latest changes before making modifications: `git pull origin main`
  2. Create feature branches for new functionality: `git checkout -b feature/new-feature`
  3. Make atomic commits with clear messages describing what changed
  4. Keep commit messages in present tense and concise (under 50 characters)
  5. Push feature branches to remote and create pull requests for review
  
  ## Troubleshooting Common Issues
  - **Merge conflicts**: When Git cannot automatically merge changes, manually edit conflicted files and mark as resolved with `git add <resolved_files>`
  - **Accidentally committed wrong file**: Use `git reset HEAD~1` to uncommit and re-stage properly
  - **Need to change last commit message**: Use `git commit --amend -m "Corrected message"`
  