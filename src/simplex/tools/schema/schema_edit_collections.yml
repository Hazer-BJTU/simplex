view_workspace:
  description: >-
    Used to retrieve the current workspace file structure.
    This operation refreshes the workspace view. 
    You can use this tool to refresh when you find the workspace structure or files' content are out of date.
    In some editing operations, updated workspace information may be provided directly,
    eliminating the need for repeated retrieval.
  params: []

show_details:
  description: >-
    Used to display detailed information about a directory or file in the workspace.
    For a directory, list all its subdirectories and files;
    for a file, attempt to analyze its source code structure or provide a content preview.
    You can directly navigate to the target directory / file without calling this function step by step to show each directory level.
    It is a good practice to use this method to show a structural preview before browsing the file content directly.
    Dependencies and function / class definitions of the source file will be displayed directly.
  params:
    - field: target_path
      type: string
      description: 
        Indicates the target file path. You should use relative paths relative to the workspace base directory, not full paths (i.e., paths that include the base directory).
      required: True

view_file_content:
  description: 
    Used to browse the specific content of a file.
  params:
    - field: target_path
      type: string
      description:
        Indicates the target file path. You should use relative paths relative to the workspace base directory, not full paths (i.e., paths that include the base directory).
      required: True

    - field: line_start
      type: integer
      description: >-
        Indicates the starting line number, where line numbering begins at 1 in a file.
        If not specified, the default value is 1.
      required: False
    
    - field: line_end
      type: integer
      description: >-
        Indicates the ending line number (inclusive).
        If not specified, the tool server will browse the file for the first several lines.
      required: False

edit_file_content:
  description: >-
    Used for editing text content. There are two modes: 'replace' and 'insert'.
    In 'insert' mode, the 'content' is inserted AFTER the specified 'line_start' line.
    In 'replace' mode, the original text between line numbers 'line_start' and 'line_end' (inclusive) is replaced with 'content'.
    Replacing text with empty 'content' is equivalent to deleting the original text.
    You can use 'line_start' that is equal to 'line_end' to represent a single line.
    You can judge whether the edit is correct based on the feedback.
    Pay attention to indentation alignment, unclosed brackets or duplicated lines inserted.
  params:
    - field: target_path
      type: string
      description:
        Indicates the target file path. You should use relative paths relative to the workspace base directory, not full paths (i.e., paths that include the base directory).
      required: True

    - field: edit_type
      type: string
      description:
        Choose between 'replace' and 'insert'.
      enum: ['replace', 'insert']
      required: True

    - field: content
      type: string
      description: >-
        The content to be inserted or to replace the original text.
        Pay special attention to indentation when writing content,
        especially for languages like Python that enforce indentation alignment.
      required: True

    - field: line_start
      type: integer
      description: >-
        Indicates the starting line number, where line numbering begins at 1 in a file.
        If not specified, the tool server will directly append 'content' to the end of the file under 'insert' mode,
        while throwing an exception under 'replace' mode.
      required: False

    - field: line_end
      type: integer
      description:
        Indicates the ending line number (inclusive). This parameter is ignored in 'insert' mode.
      required: False

str_replace_edit:
  description: >-
    Used for editing text content. Two different scopes are supported: 'once_only' and 'all'.
    When 'once_only' is specified, the occurrence of 'original_content' in the target text file will be replaced with 'new_content'.
    An exception will be thrown when 'original_content' occurs multiple times in the target text under 'once_only' mode.
    When 'all' is specified, **all occurrences** of 'original_content' in the target text file will be replaced with 'new_content'.
    Note that this method performs an exact match on 'original_content', so you should pay close attention to invisible characters such as indentation and spaces in the text. 
    A good practice is to provide more context to achieve precise matching.
  params:
    - field: target_path
      type: string
      description:
        Indicates the target file path. You should use relative paths relative to the workspace base directory, not full paths (i.e., paths that include the base directory).
      required: True

    - field: original_content
      type: string
      description:
        The original text snippet to be replaced.
      required: True

    - field: new_content
      type: string
      description:
        The new text snippet to substitute the original content.
      required: True

    - field: scope
      type: string
      description:
        Choose between 'once_only' and 'all'.
      enum: ['once_only', 'all']
      required: True

undo:
  description: >-
    This tool is used to undo your last edit operation. 
    Note that it only applies to edit operations and cannot undo changes caused by creating, deleting, renaming files, or modifications made via bash commands.
    You can perform multiple undo operations on a single file, but you must specify the filename. Only the specified file will be affected. 
    The file content will be restored to the state before your edit operation.
    Please browse the file again after undoing to maintain an accurate understanding.
  params:
    - field: target_path
      type: string
      description:
        Indicates the target file path. You should use relative paths relative to the workspace base directory, not full paths (i.e., paths that include the base directory).
      required: True

search:
  description: >-
    Used for keyword retrieval. There are three modes: 'definition', 'identifier' or 'pattern'.
    'definition' performs an exact match on defined code elements such as classes and functions (use pure names like 'ContextPipelineManager', 'get_global_function_register', 'CACHE_SIZE').
    'identifier' matches identifiers within code or text and can be used to retrieve dependencies (use pure names like 'ContextPipelineManager', 'get_global_function_register', 'CACHE_SIZE').
    'pattern' carries out pure string matching, suitable for finding specific invocation or initialization patterns.
    When calling this function, try to avoid using overly broad keywords (e.g., '__init__' for python).
    The 'glob' pattern you provide will be applied under the workspace base directory.
  params:
    - field: key_words
      type: string
      description:
        Give a set of keywords separated by commas, e.g., 'vector, matrix, tensor'.
      required: True

    - field: mode
      type: string
      description:
        Choose between 'definition', 'identifier' or 'pattern'. Regex is NOT supported.
      enum: ['definition', 'identifier', 'pattern']
      required: True

    - field: glob
      type: string
      description: >-
        You can use this parameter to provide a simple glob pattern for filtering files. 
        Supported syntax includes: *, **, ?, [], [!...] or [^...].
        For example: 'file[!2-4].rs' or 'file[^2-4].txt', '**/test_?.[ch]', '[a-zA-Z0-9].*', 'src/**/*.cpp'.
        The glob pattern you provide will be applied under the workspace base directory.
      required: True

operate_filesystem:
  description: >-
    The file system operation supports three modes: 'create', 'remove', and 'rename', specified via the 'operation' parameter.
    'create': Creates a new file at 'target_path' and writes 'content' to it. Parent directories will be created automatically.
    'remove': Removes the target at 'target_path', which can be either a file or a directory.
    'rename': Moves the target at 'source_path' (if it exists) to 'target_path'. Parent directories will be created automatically.
  params:
    - field: operation
      type: string
      description:
        Choose between 'create', 'remove' or 'rename'.
      enum: ['create', 'remove', 'rename']
      required: True

    - field: target_path
      type: string
      description:
        Indicates the target file path. You should use relative paths relative to the workspace base directory, not full paths (i.e., paths that include the base directory).
      required: True
    
    - field: source_path
      type: string
      description: >-
        Indicates the source file path. You should use relative paths relative to the workspace base directory, not full paths (i.e., paths that include the base directory).
        This argument only works when using operation 'rename' and will be ignored under other operations.
      required: False

    - field: content
      type: string
      description: >-
        Initial content will be written into the created file.
        This argument only works when using operation 'create' and will be ignored under other operations.
      required: False
